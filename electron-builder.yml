appId: com.lolbestpicker.app
productName: LoL Best Picker
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

# electron-vite emits the bundled main/preload/renderer to out/.
files:
  - out/**/*
  - package.json

# better-sqlite3 ships a native .node binding that cannot run from inside the asar
# archive — unpack native modules so they load at runtime.
asarUnpack:
  - '**/*.node'

# Rebuild native deps (better-sqlite3) against the bundled Electron ABI at package time.
npmRebuild: true

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}

nsis:
  # Assisted (multi-page) installer, current-user only — installs under
  # %LOCALAPPDATA%\Programs and never requires admin rights (spec 005 SC-007).
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true

  # Shortcuts (FR-008). The assisted UI exposes the desktop-shortcut checkbox.
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: LoL Best Picker
  runAfterFinish: true

  # User data (SQLite, .env.local) lives in %LOCALAPPDATA%\LolBestPicker and must
  # survive upgrade/repair/modify (FR-007). Removal is handled by the custom
  # uninstall prompt below, never wiped automatically (FR-009).
  deleteAppDataOnUninstall: false

  # build/installer.nsh is auto-detected from buildResources and injects:
  #  - an "Environment Configuration" wizard page (FR-002/FR-003),
  #  - silent-mode /KEY=value parsing (FR-012), and
  #  - the uninstall "keep or remove my data" prompt (FR-009).
  # See that file for the customInstall / customUnInstall / page macros.
